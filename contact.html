<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Christina's Shop</title>
    <link rel="icon" type="image/png" href="images/favico.png">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500;700&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --petrol-dark: #005f73;
            --petrol-medium: #0a9396;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --white: #ffffff;
            --gold: #e9d8a6;
            --cursive-font: 'Dancing Script', cursive;
        }

        body {
            margin: 0;
            font-family: 'Comfortaa', cursive;
            background: radial-gradient(circle at top right, #94d2bd, #0a9396, #005f73);
            background-attachment: fixed;
            color: var(--white);
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            z-index: 2000;
        }

        .logo { font-family: var(--cursive-font); font-weight: 700; font-size: 2.2rem; }

        .nav-links { 
            display: flex; 
            align-items: center; 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .nav-links a {
            text-decoration: none;
            color: var(--white);
            margin: 0 20px;
            font-family: var(--cursive-font);
            font-size: 1.8rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--gold); }

        /* Language Switcher */
        .custom-select { position: relative; }
        .select-selected {
            background: var(--glass-bg);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
        }
        .select-items {
            position: absolute;
            background: rgba(10, 147, 150, 0.95);
            border-radius: 15px;
            top: 110%; right: 0;
            display: none;
            min-width: 120px;
            z-index: 99;
        }
        .select-items div { padding: 10px; cursor: pointer; font-size: 0.9rem; }
        .select-show { display: block; }

        .menu-btn { display: none; font-size: 1.5rem; cursor: pointer; }

        /* --- Layout --- */
        .container { max-width: 1200px; margin: 120px auto 50px; padding: 20px; }
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 50px;
        }

        /* --- Form Style --- */
        .contact-form {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 30px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--gold); }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Comfortaa';
            outline: none;
        }
        .submit-btn {
            background: var(--petrol-dark);
            color: white;
            border: 1px solid var(--gold);
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--cursive-font);
            font-size: 1.5rem;
            transition: 0.3s;
            width: 100%;
        }
        .submit-btn:hover { background: var(--gold); color: var(--petrol-dark); }

        /* --- Info Cards --- */
        .info-panel { text-align: left; }
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            background: var(--glass-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .info-item:hover { transform: translateX(10px); background: rgba(255,255,255,0.2); }
        .info-item i { font-size: 1.8rem; color: var(--gold); margin-right: 20px; width: 40px; text-align: center; }
        
        .social-icons { display: flex; gap: 15px; margin-top: 20px; }
        .social-icons a {
            width: 50px; height: 50px;
            background: var(--glass-bg);
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 1px solid var(--glass-border);
            color: var(--gold); font-size: 1.5rem; transition: 0.3s;
        }
        .social-icons a:hover { background: var(--gold); color: var(--petrol-dark); transform: translateY(-5px); }

        /* --- Map --- */
        .map-container {
            margin-top: 40px;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .contact-wrapper { grid-template-columns: 1fr; }
            .nav-links {
                display: none; flex-direction: column; top: 80px; width: 100%;
                background: rgba(10, 147, 150, 0.98); border-radius: 20px; padding: 30px 0;
                left: 50%; transform: translateX(-50%);
            }
            .nav-links.active { display: flex; }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Christina's</div>
        
        <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        
        <div class="nav-links" id="navLinks">
            <a href="index.html" id="menu-home">HOME</a>
            <a href="photos.html" id="menu-photos">PHOTOS</a>
            <a href="products.html" id="menu-products">PRODUCTS</a>
            <a href="history.html" id="menu-history">HISTORY</a>
            <a href="contact.html" id="menu-contact" style="color: var(--gold);">CONTACT</a>
        </div>

        <div class="custom-select" id="langSwitcher">
            <div class="select-selected" id="currentLang">English 🇬🇧</div>
            <div class="select-items" id="langOptions">
                <div onclick="changeLang('en')">English 🇬🇧</div>
                <div onclick="changeLang('gr')">Ελληνικά 🇬🇷</div>
                <div onclick="changeLang('nl')">Nederlands 🇳🇱</div>
                <div onclick="changeLang('de')">Deutsch 🇩🇪</div>
                <div onclick="changeLang('tr')">Türkçe 🇹🇷</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 style="text-align:center; font-family: var(--cursive-font); font-size: 4rem; color: var(--gold);" data-aos="fade-down" id="page-title">Contact Us</h1>
        <p style="text-align:center;" id="hero-slogan">Style and quality for you</p>

        <div class="contact-wrapper">
            <div class="contact-form" data-aos="fade-right">
                <form action="https://formsubmit.co/christinachartzanioti26@gmail.com" method="POST">
                    <div class="form-group">
                        <label id="lbl-name">Name</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-group">
                        <label id="lbl-email">Email</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label id="lbl-phone">Phone</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="form-group">
                        <label id="lbl-subject">Subject</label>
                        <input type="text" name="_subject">
                    </div>
                    <div class="form-group">
                        <label id="lbl-msg">Message</label>
                        <textarea name="message" rows="5" required></textarea>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-start; gap: 10px;">
                        <input type="checkbox" id="privacy-check" required style="width: auto; margin-top: 5px;">
                        <label for="privacy-check" style="font-size: 0.8rem; color: white;">
                            I agree to the <a href="privacy.html" target="_blank" style="color: var(--gold);">Privacy Policy</a> and the processing of my data.
                        </label>
                    </div>
                    <button type="submit" class="submit-btn" id="btn-send">Send Message</button>
                </form>
            </div>

            <div class="info-panel" data-aos="fade-left">
                <h2 style="font-family: var(--cursive-font); color: var(--gold);" id="info-title">Find Us</h2>
                
                <a href="mailto:christinachartzanioti26@gmail.com" class="info-item">
                    <i class="fas fa-envelope"></i>
                    <span>christinachartzanioti26@gmail.com</span>
                </a>

                <a href="tel:+306982347557" class="info-item">
                    <i class="fas fa-phone"></i>
                    <span>+30 698 234 7557</span>
                </a>

                <div style="display: flex; gap: 10px;">
                    <a href="viber://chat?number=+306982347557" class="info-item" style="flex:1">
                        <i class="fab fa-viber"></i><span>Viber</span>
                    </a>
                    <a href="https://wa.me/306982347557" class="info-item" style="flex:1">
                        <i class="fab fa-whatsapp"></i><span>WhatsApp</span>
                    </a>
                </div>

                <h3 id="social-title">Social Media</h3>
                <div class="social-icons">
                    <a href="https://www.facebook.com/profile.php?id=100057052586442&rdid=gLX2b04kyAS5Fe2M&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F18dsBM8vET%2F#" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.facebook.com/christina.chartzanioti" target="_blank"><i class="fas fa-user"></i></a>
                    <a href="https://www.instagram.com/christina_samos/" target="_blank"><i class="fab fa-instagram"></i></a>
                </div>

                <div class="map-container">
                    <h3 id="map-text" style="padding: 10px; margin: 0; background: var(--glass-bg); text-align: center; font-size: 1rem;">
                        <i class="fas fa-map-marker-alt"></i> Πλατεία Κοκκάρι, Σάμος
                    </h3>
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1580.407409214736!2d26.88514107604586!3d37.77852199480112!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14be090022d46e33%3A0xb3516599be524020!2zQ2hyaXN0aW5hJ3MgU2hvcA!5e0!3m2!1sel!2sgr!4v1711200000000!5m2!1sel!2sgr" 
                        width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200 });
        function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }

        const switcher = document.getElementById('langSwitcher');
        const options = document.getElementById('langOptions');
        const currentLangDisplay = document.getElementById('currentLang');

        switcher.addEventListener('click', (e) => {
            e.stopPropagation();
            options.classList.toggle('select-show');
        });

        const data = {
            en: {
                label: "English 🇬🇧", home: "HOME", history: "HISTORY", photos: "PHOTOS", products: "PRODUCTS", contact: "CONTACT",
                title: "Contact Us", slogan: "Style and quality for you",
                name: "Name", email: "Email", phone: "Phone", subject: "Subject", msg: "Message", send: "Send Message",
                find: "Find Us", social: "Social Media", map: "Kokkari Square, Samos"
            },
            gr: {
                label: "Ελληνικά 🇬🇷", home: "ΑΡΧΙΚΗ", history: "ΙΣΤΟΡΙΑ", photos: "ΦΩΤΟΓΡΑΦΙΕΣ", products: "ΠΡΟΪΟΝΤΑ", contact: "ΕΠΙΚΟΙΝΩΝΙΑ",
                title: "Επικοινωνία", slogan: "Στυλ και ποιότητα για εσάς",
                name: "Όνομα", email: "Email", phone: "Τηλέφωνο", subject: "Θέμα", msg: "Μήνυμα", send: "Αποστολή",
                find: "Βρείτε μας", social: "Social Media", map: "Πλατεία Κοκκάρι, Σάμος"
            },
            nl: {
                label: "Nederlands 🇳🇱", home: "HOME", history: "HISTORIE", photos: "FOTO'S", products: "PRODUCTEN", contact: "CONTACT",
                title: "Contact", slogan: "Stijl en kwaliteit voor jou",
                name: "Naam", email: "Email", phone: "Telefoon", subject: "Onderwerp", msg: "Bericht", send: "Versturen",
                find: "Vind ons", social: "Social Media", map: "Kokkari-plein, Samos"
            },
            de: {
                label: "Deutsch 🇩🇪", home: "STARTSEITE", history: "GESCHICHTE", photos: "FOTOS", products: "PRODUKTE", contact: "KONTAKT",
                title: "Kontakt", slogan: "Stil und Qualität für Sie",
                name: "Name", email: "Email", phone: "Telefon", subject: "Betreff", msg: "Nachricht", send: "Absenden",
                find: "Finde uns", social: "Social Media", map: "Kokkari-Platz, Samos"
            },
            tr: {
                label: "Türkçe 🇹🇷", home: "ANASAYFA", history: "HİKAYEMİZ", photos: "FOTOĞRAFLAR", products: "ÜRÜNLER", contact: "İLETİŞİM",
                title: "İletişim", slogan: "Sizin için stil ve kalite",
                name: "İsim", email: "E-posta", phone: "Telefon", subject: "Konu", msg: "Mesaj", send: "Gönder",
                find: "Bizi Bulun", social: "Sosyal Medya", map: "Kokkari Meydanı, Sisam"
            }
        };

        function changeLang(lang) {
            const t = data[lang];
            currentLangDisplay.innerHTML = t.label;
            document.getElementById('menu-home').innerText = t.home;
            document.getElementById('menu-photos').innerText = t.photos;
            document.getElementById('menu-products').innerText = t.products;
            document.getElementById('menu-history').innerText = t.history;
            document.getElementById('menu-contact').innerText = t.contact;
            document.getElementById('page-title').innerText = t.title;
            document.getElementById('hero-slogan').innerText = t.slogan;
            
            // Φόρμα
            document.getElementById('lbl-name').innerText = t.name;
            document.getElementById('lbl-email').innerText = t.email;
            document.getElementById('lbl-phone').innerText = t.phone;
            document.getElementById('lbl-subject').innerText = t.subject;
            document.getElementById('lbl-msg').innerText = t.msg;
            document.getElementById('btn-send').innerText = t.send;

            // Info
            document.getElementById('info-title').innerText = t.find;
            document.getElementById('social-title').innerText = t.social;
            document.getElementById('map-text').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${t.map}`;

            options.classList.remove('select-show');
        }

        window.onclick = () => options.classList.remove('select-show');
    </script>
</body>
</html>
