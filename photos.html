<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Christinas Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500;700&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/favico.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --petrol-dark: #005f73;
            --petrol-medium: #0a9396;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --white: #ffffff;
            --gold: #e9d8a6;
            --cursive-font: 'Dancing Script', cursive;
        }

        body {
            margin: 0;
            font-family: 'Comfortaa', cursive;
            background: radial-gradient(circle at top right, #94d2bd, #0a9396, #005f73);
            background-attachment: fixed;
            color: var(--white);
            overflow-x: hidden;
        }

        /* --- Navigation & Hamburger --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            z-index: 2000;
        }

        .logo { font-family: var(--cursive-font); font-weight: 700; font-size: 2.2rem; }

        /* Κεντραρισμένο και Μεγάλο Μενού */
        .nav-links { 
            display: flex; 
            align-items: center; 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .nav-links a {
            text-decoration: none;
            color: var(--white);
            margin: 0 20px;
            font-family: var(--cursive-font);
            font-size: 1.8rem; /* Πιο μεγάλα γράμματα */
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--gold); }

        /* Language Switcher Style */
        .custom-select { position: relative; }
        .select-selected {
            background: var(--glass-bg);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
        }
        .select-items {
            position: absolute;
            background: rgba(10, 147, 150, 0.95);
            border-radius: 15px;
            top: 110%; right: 0;
            display: none;
            min-width: 120px;
            z-index: 99;
        }
        .select-items div { padding: 10px; cursor: pointer; font-size: 0.9rem; }
        .select-show { display: block; }

        .menu-btn { display: none; font-size: 1.5rem; cursor: pointer; }

        /* --- Gallery Sections --- */
        .container { max-width: 1200px; margin: 120px auto 50px; padding: 20px; text-align: center; }
        
        h1, h2 { font-family: var(--cursive-font); color: var(--gold); }
        h1 { font-size: 4.5rem; }
        h2 { font-size: 2.5rem; margin-top: 60px; }

        /* 1. 3D Rotating Wheel */
        .wheel-container {
            position: relative;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin: 50px 0;
        }
        .wheel {
            width: 200px;
            height: 250px;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotateWheel 20s linear infinite;
        }
        .wheel:hover { animation-play-state: paused; }
        .wheel img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid var(--glass-border);
        }
        .wheel img:nth-child(1) { transform: rotateY(0deg) translateZ(350px); }
        .wheel img:nth-child(2) { transform: rotateY(45deg) translateZ(350px); }
        .wheel img:nth-child(3) { transform: rotateY(90deg) translateZ(350px); }
        .wheel img:nth-child(4) { transform: rotateY(135deg) translateZ(350px); }
        .wheel img:nth-child(5) { transform: rotateY(180deg) translateZ(350px); }
        .wheel img:nth-child(6) { transform: rotateY(225deg) translateZ(350px); }
        .wheel img:nth-child(7) { transform: rotateY(270deg) translateZ(350px); }
        .wheel img:nth-child(8) { transform: rotateY(315deg) translateZ(350px); }

        @keyframes rotateWheel { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        /* 2. Masonry Grid */
        .masonry { column-count: 3; column-gap: 20px; margin-top: 40px; }
        .masonry-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            margin-bottom: 20px;
            padding: 10px;
            break-inside: avoid;
            transition: 0.4s;
        }
        .masonry-item img { width: 100%; border-radius: 10px; display: block; }

        /* 3. Sliding Panel */
        .slider-section { width: 100%; height: 500px; display: flex; gap: 10px; margin: 50px 0; }
        .panel {
            flex: 1;
            height: 100%;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            cursor: pointer;
            transition: flex 0.7s ease-in-out;
            border: 1px solid var(--glass-border);
        }
        .panel:hover { flex: 5; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                top: 80px;
                width: 100%;
                background: rgba(10, 147, 150, 0.98);
                border-radius: 20px;
                padding: 30px 0;
                left: 50%;
                transform: translateX(-50%);
            }
            .nav-links.active { display: flex; }
            .nav-links a { margin: 15px 0; font-size: 2rem; }
            .menu-btn { display: block; }
            .masonry { column-count: 2; column-gap: 10px; }
            .masonry-item { padding: 5px; margin-bottom: 10px; }
            
            /* Εμφάνιση ρόδας στα κινητά με προσαρμογή */
            .wheel-container { display: flex; height: 300px; perspective: 800px; }
            .wheel { width: 120px; height: 160px; }
            .wheel img:nth-child(1) { transform: rotateY(0deg) translateZ(160px); }
            .wheel img:nth-child(2) { transform: rotateY(45deg) translateZ(160px); }
            .wheel img:nth-child(3) { transform: rotateY(90deg) translateZ(160px); }
            .wheel img:nth-child(4) { transform: rotateY(135deg) translateZ(160px); }
            .wheel img:nth-child(5) { transform: rotateY(180deg) translateZ(160px); }
            .wheel img:nth-child(6) { transform: rotateY(225deg) translateZ(160px); }
            .wheel img:nth-child(7) { transform: rotateY(270deg) translateZ(160px); }
            .wheel img:nth-child(8) { transform: rotateY(315deg) translateZ(160px); }
            
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Christina's</div>
        
        <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        
        <div class="nav-links" id="navLinks">
            <a href="index.html" id="menu-home">HOME</a>
            <a href="photos.html" id="menu-photos" style="color: var(--gold);">PHOTOS</a>
            <a href="products.html" id="menu-products">PRODUCTS</a>
            <a href="history.html" id="menu-history">HISTORY</a>
            <a href="contact.html" id="menu-contact">CONTACT</a>
        </div>

        <div class="custom-select" id="langSwitcher">
            <div class="select-selected" id="currentLang">English 🇬🇧</div>
            <div class="select-items" id="langOptions">
                <div onclick="changeLang('en')">English 🇬🇧</div>
                <div onclick="changeLang('gr')">Ελληνικά 🇬🇷</div>
                <div onclick="changeLang('nl')">Nederlands 🇳🇱</div>
                <div onclick="changeLang('de')">Deutsch 🇩🇪</div>
                <div onclick="changeLang('tr')">Türkçe 🇹🇷</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 id="gallery-title" data-aos="fade-down">Our Gallery</h1>
        <p id="hero-slogan">Style and quality for you</p>

        <h2 id="section-wheel" data-aos="fade-up">Gallery</h2>
        <div class="wheel-container" data-aos="zoom-in">
            <div class="wheel">
                <img src="images/all.jpg" alt="1">
                <img src="images/body.jpeg" alt="2">
                <img src="images/cosm2.jpeg" alt="3">
                <img src="images/body2.jpg" alt="4">
                <img src="images/cosm.jpeg" alt="5">
                <img src="images/keramika.jpeg" alt="6">
                <img src="images/kolie.jpeg" alt="7">
                <img src="images/out.jpg" alt="8">
            </div>
        </div>

        <h2 id="section-discover" data-aos="fade-up">Discover More</h2>
        <div class="slider-section">
            <div class="panel" style="background-image: url('images/keramika.jpeg');"></div>
            <div class="panel" style="background-image: url('images/kolie.jpeg');"></div>
            <div class="panel" style="background-image: url('images/out.jpg');"></div>
            <div class="panel" style="background-image: url('images/out2.jpg');"></div>
        </div>

        <h2 id="section-collections" data-aos="fade-up">All Collections</h2>
        <div class="masonry">
            <div class="masonry-item" data-aos="fade-up"><img src="images/all.jpg"></div>
             <div class="masonry-item" data-aos="fade-up"><img src="images/stathis.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/body.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/christina_skylos.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/faoysta_christina.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/georgia_skylos.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/customers.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/family.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/mother_daughter.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/mother_daugter2.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/customers.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/body2.jpg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/favico.png"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/gata.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/hb.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/keramika.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/kolie.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/marios_christina.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/out.jpg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/out2.jpg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/skylos.jpeg"></div>
            <div class="masonry-item" data-aos="fade-up"><img src="images/two.jpg"></div>
        </div>
    </div>

    <footer style="text-align: center; padding: 50px; background: rgba(0,0,0,0.2);">
        <p>&copy; 2026 Christinas Shop</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200 });

        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        const switcher = document.getElementById('langSwitcher');
        const options = document.getElementById('langOptions');
        const currentLangDisplay = document.getElementById('currentLang');

        switcher.addEventListener('click', (e) => {
            e.stopPropagation();
            options.classList.toggle('select-show');
        });

        const data = {
            en: {
                label: "English 🇬🇧", home: "HOME", photos: "PHOTOS", products: "PRODUCTS", history: "HISTORY", contact: "CONTACT",
                title: "Our Gallery", slogan: "Style and quality for you",
                wheel: "Gallery", discover: "Discover More", collections: "All Collections"
            },
            gr: {
                label: "Ελληνικά 🇬🇷", home: "ΑΡΧΙΚΗ", photos: "ΦΩΤΟΓΡΑΦΙΕΣ", products: "ΠΡΟΪΟΝΤΑ", history: "ΙΣΤΟΡΙΑ", contact: "ΕΠΙΚΟΙΝΩΝΙΑ",
                title: "Η Γκαλερί μας", slogan: "Στυλ και ποιότητα για εσάς",
                wheel: "Συλλογή", discover: "Ανακαλύψτε Περισσότερα", collections: "Όλες οι Συλλογές"
            },
            nl: {
                label: "Nederlands 🇳🇱", home: "HOME", photos: "FOTO'S", products: "PRODUCTEN", history: "HISTORIE", contact: "CONTACT",
                title: "Onze Galerij", slogan: "Stijl en kwaliteit voor jou",
                wheel: "Galerij", discover: "Ontdek meer", collections: "Alle Collecties"
            },
            de: {
                label: "Deutsch 🇩🇪", home: "STARTSEITE", photos: "FOTOS", products: "PRODUKTE", history: "GESCHICHTE", contact: "KONTAKT",
                title: "Unsere Galerie", slogan: "Stil und Qualität für Sie",
                wheel: "Galerie", discover: "Mehr entdecken", collections: "Alle Kollektionen"
            },
            tr: {
                label: "Türkçe 🇹🇷", home: "ANASAYFA", photos: "FOTOĞRAFLAR", products: "ÜRÜNLER", history: "HİKAYEMİZ", contact: "İLETİŞİM",
                title: "Galerimiz", slogan: "Sizin için stil και kalite",
                wheel: "Galeri", discover: "Dahası", collections: "Tüm Koleksiyonlar"
            }
        };

        function changeLang(lang) {
            const t = data[lang];
            currentLangDisplay.innerHTML = t.label;
            document.getElementById('menu-home').innerText = t.home;
            document.getElementById('menu-photos').innerText = t.photos;
            document.getElementById('menu-products').innerText = t.products;
            document.getElementById('menu-history').innerText = t.history;
            document.getElementById('menu-contact').innerText = t.contact;
            document.getElementById('gallery-title').innerText = t.title;
            document.getElementById('hero-slogan').innerText = t.slogan;
            document.getElementById('section-wheel').innerText = t.wheel;
            document.getElementById('section-discover').innerText = t.discover;
            document.getElementById('section-collections').innerText = t.collections;
            options.classList.remove('select-show');
        }

        window.onclick = () => options.classList.remove('select-show');
    </script>
</body>
</html>
